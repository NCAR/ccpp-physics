name: Doxygen GitHub Pages Deploy Action

on:
  push:
    branches:
      - main
      - scidocs_hsd_aqua
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:

    - name: Install Doxygen + Graphviz + LaTeX
      run: |
        sudo apt-get update
        sudo apt-get install -y doxygen graphviz perl texlive-latex-base texlive-latex-extra texlive-fonts-recommended texlive-bibtex-extra

    - name: Verify installations
      run: |
        which perl
        which bibtex
        doxygen --version

    - name: Checkout CCPP framework
      uses: actions/checkout@v4
      with:
        repository: NCAR/ccpp-framework
        ref: develop
        path: fw_repo 

    - name: Checkout current ccpp-physics code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        path: main_repo
        submodules: recursive

    - name: Build HSD docs
      run: |
        cd main_repo/physics/docs
        doxygen ccpphsd_doxyfile

    - name: Checkout CCPP V7 tag
      uses: actions/checkout@v4
      with:
        ref: v7.0.0
        path: v7_repo
        submodules: recursive

    - name: Generate metadata tables
      run: |
        cd v7_repo
        export PYTHONPATH=$(pwd)/fw_repo/scripts:$(pwd)/fw_repo/scripts/parse_tools
        ./scripts/metadata2html.py -c ../main_repo/physics/docs/pdftxt/RE7/ccpp_prebuild_config.py
        mkdir -p physics/docs/html/V7
        mv physics/docs/*.html physics/docs/html/V7

    - name: Build V7 docs
      run: |
        cd v7_repo/physics/docs
        doxygen ccpp_doxyfile
        mkdir -p ../../../physics/docs/html/V7
        mv doc/html/* ../../../physics/docs/html/V7/

    - name: Checkout ufs-community SRWv3 branch
      uses: actions/checkout@v4
      with:
        repository: ufs-community/ccpp-physics
        ref: release/srw-v3
        path: srw_repo
        submodules: recursive

    - name: Build SRWv3 docs
      run: |
        cd srw_repo/physics/docs
        doxygen ccppsrw_doxyfile
        mkdir -p ../../../physics/docs/html/SRWv3
        mv doc/html/* ../../../physics/docs/html/SRWv3/

    - name: Checkout main branch again for landing page
      uses: actions/checkout@v4
      with:
        ref: scidocs_hsd_aqua
        path: main_repo

    - name: Build landing page
      run: |
        cd main_repo/physics/docs
        doxygen mainpage_doxyfile
        cp -r html/* $GITHUB_WORKSPACE/physics/docs/html/

    - name: Setup Pages
      uses: actions/configure-pages@v5

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: physics/docs/html

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4.0.5
