name: Doxygen GitHub Pages Deploy Action

on:
  push:
    branches:
      - main
      - scidocs_hsd_aqua
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:

    - name: Checkout current ccpp-physics code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install Doxygen + Graphviz + LaTeX
      run: |
        sudo apt-get update
        sudo apt-get install -y doxygen graphviz perl texlive-latex-base texlive-latex-extra texlive-fonts-recommended texlive-bibtex-extra

    - name: Verify installations
      run: |
        which perl
        which bibtex
        doxygen --version

    - name: Build HSD docs
      run: |
        cd physics/docs
        doxygen ccpphsd_doxyfile

    - name: Checkout V7 tag
      run: |
        git fetch --tags
        git checkout v7.0.0

    - name: Build V7 docs
      run: |
        cd physics/docs
        doxygen ccpp_doxyfile
        mkdir -p html/V7
        mv doc/html/* html/V7/

    - name: Checkout ufs-community SRWv3 branch
      uses: actions/checkout@v4
      with:
        repository: ufs-community/ccpp-physics
        ref: release/srw-v3
        path: srw_repo

    - name: Build SRWv3 docs
      run: |
        cd srw_repo/physics/docs
        doxygen ccppsrw_doxyfile
        mkdir -p ../../../physics/docs/html/SRWv3
        mv doc/html/* ../../../physics/docs/html/SRWv3/

    - name: Create landing page
      run: |
        cat << 'EOF' > physics/docs/html/index.html
        <!DOCTYPE html>
        <html>
        <head>
            <title>CCPP Physics Scientific Documentation</title>
            <style>
            </style>
        </head>
        <body>
            <div class="container">
                <h1>CCPP Physics Scientific Documentation</h1>

                <p>The Common Community Physics Package (CCPP) provides scientific documentation for the physics suites and parameterizations used across a variety of atmospheric modeling applications. The documentation describes the scientific basis, configuration options, and implementation details for the parameterizations included in the CCPP physics suites for different modeling systems and use cases.</p>
                <ul style="list-style-type: none; padding-left: 0;">
                  <li><a href="./V7/">CCPP Physics V7 Scientific Documentation</a></li>
                  <li><a href="./HSD/">CCPP Physics Hierarchical System Development (HSD) Scientific Documentation</a></li>
                  <li><a href="./SRWv3/">CCPP Physics SRW v3 Scientific Documentation</a></li>
                </ul>

                <p>For more information about the CCPP including Release Information, Technical Documentation, and Code, please visit the <a href="https://dtcenter.org/software-tools/common-community-physics-package-ccpp" target="_blank"> CCPP Website</a>, hosted by the Developmental Testbed Center (DTC).</p>
            </div>
        </body>
        </html>
        EOF

    - name: Setup Pages
      uses: actions/configure-pages@v5

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: physics/docs/html

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4.0.5
